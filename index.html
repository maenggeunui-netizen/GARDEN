<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monthly Garden AI 배치</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, sans-serif; background:#f5f5f5; color:#222; }
  .wrap { max-width: 480px; margin: 0 auto; min-height: 100vh; background:#fff; display:flex; flex-direction:column; }
  .header { padding:16px; background:linear-gradient(135deg,#2D8A3D,#45A049); color:#fff; font-weight:700; text-align:center; }
  .content { padding:16px; }
  .card { background:#fff; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.08); padding:16px; margin-bottom:14px; }
  .ai-preview {
    width: 100%;
    height: 220px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(45,138,61,.18), rgba(69,160,73,.12));
    border: 1px dashed #2D8A3D;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    margin-bottom: 12px;
    color:#2D8A3D;
    font-size: 15px;
    text-align:center;
    padding: 12px;
  }
  .ai-preview img, .ai-preview canvas { position:absolute; inset:0; width:100%; height:100%; }
  .ai-preview canvas { display:none; }
  .button-group { display:flex; gap:10px; margin-bottom: 12px; }
  button {
    border:0; border-radius:10px; padding:12px 14px; font-weight:700; cursor:pointer;
  }
  .btn-camera { background:#2D8A3D; color:#fff; flex:1; }
  .btn-upload { background:#45A049; color:#fff; flex:1; }
  .btn-download { background:#2D8A3D; color:#fff; width:100%; margin-top: 10px; }
  .loading { display:none; text-align:center; padding:16px 0; }
  .loading.active { display:block; }
  .spinner { width:34px; height:34px; border-radius:50%; border:4px solid rgba(45,138,61,.15); border-top-color:#2D8A3D; margin:0 auto 10px; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { display:none; background:rgba(45,138,61,.08); border-radius:12px; padding:14px; }
  .result.active { display:block; }
  .result-title { font-weight:800; color:#2D8A3D; margin-bottom: 6px; }
  .result-text { font-size:13px; line-height:1.6; color:#555; }
  .tips { margin:10px 0 0 18px; padding:0; font-size:13px; color:#555; }
  input[type=file]{display:none;}
  .meta { font-size:12px; color:#666; margin-bottom:8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">Monthly Garden · AI 배치 서비스</div>
    <div class="content">
      <div class="card">
        <div class="meta">사진을 업로드하면 AI가 식물 배치를 시각적으로 합성합니다.</div>
        <div class="ai-preview" id="ai-preview">📸 사진을 업로드해 주세요<br>Canvas로 식물 배치가 생성됩니다</div>
        <div class="button-group">
          <button class="btn-camera" onclick="openCamera()">📷 카메라</button>
          <button class="btn-upload" onclick="openFile()">📁 파일 업로드</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleImage(this)">
        <input type="file" id="file-input" accept="image/*" onchange="handleImage(this)">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <div>AI가 사진을 분석 중입니다...</div>
        </div>
        <div class="result" id="ai-result">
          <div class="result-title" id="ai-result-title"></div>
          <div class="result-text" id="ai-result-text"></div>
          <canvas id="resultCanvas"></canvas>
          <img id="resultImage" alt="AI 결과 이미지" style="display:none; width:100%; border-radius:10px; margin-top:12px;" />
          <button class="btn-download" id="download-btn" onclick="downloadImage()" style="display:none;">📥 이미지 다운로드</button>
        </div>
      </div>
    </div>
  </div>

<script>
let uploadedImageData = null;

function openCamera(){ document.getElementById('camera-input').click(); }
function openFile(){ document.getElementById('file-input').click(); }

function handleImage(input){
  if(input.files && input.files[0]){
    const reader = new FileReader();
    reader.onload = e => processImage(e.target.result);
    reader.readAsDataURL(input.files[0]);
  }
}

function processImage(imageData){
  uploadedImageData = imageData;
  const preview = document.getElementById('ai-preview');
  preview.innerHTML = '';
  preview.style.background = 'none';

  const img = document.createElement('img');
  img.src = imageData;
  img.style.width = '100%';
  img.style.height = '100%';
  img.style.objectFit = 'cover';
  preview.appendChild(img);

  document.getElementById('ai-result').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  document.getElementById('download-btn').style.display = 'none';
  document.getElementById('resultImage').style.display = 'none';

  setTimeout(() => {
    document.getElementById('loading').classList.remove('active');
    generateAILayout();
  }, 1200);
}

function generateAILayout(){
  const layouts = [
    {
      title: "실내 정원 배치",
      description: "창가 근처에 어울리는 균형 잡힌 실내 구성",
      tips: ["햇빛이 들어오는 창가에 배치", "키가 큰 식물은 뒤쪽에", "작은 화분은 선반 위로"],
      plants: [
        { emoji: "🌿", x: 0.14, y: 0.22, size: 44 },
        { emoji: "🪴", x: 0.27, y: 0.42, size: 38 },
        { emoji: "🌱", x: 0.42, y: 0.26, size: 34 },
        { emoji: "🌿", x: 0.58, y: 0.40, size: 42 },
        { emoji: "🪴", x: 0.73, y: 0.28, size: 36 }
      ]
    },
    {
      title: "베란다 정원 배치",
      description: "햇빛이 풍부한 공간을 위한 다층 배치",
      tips: ["직사광선은 중간 식물로 분산", "바닥과 난간을 함께 활용", "통풍 공간을 남겨두기"],
      plants: [
        { emoji: "🌵", x: 0.10, y: 0.45, size: 42 },
        { emoji: "🌹", x: 0.23, y: 0.30, size: 40 },
        { emoji: "🌵", x: 0.40, y: 0.50, size: 38 },
        { emoji: "🌻", x: 0.58, y: 0.28, size: 44 },
        { emoji: "🌱", x: 0.72, y: 0.46, size: 36 }
      ]
    },
    {
      title: "반음지 정원 배치",
      description: "부드러운 빛과 식물 밀도를 고려한 구성",
      tips: ["빛이 적은 구역엔 음지 식물 배치", "식물 간 간격을 넓게 유지", "습도 보완을 위해 분무 권장"],
      plants: [
        { emoji: "🌿", x: 0.16, y: 0.25, size: 40 },
        { emoji: "🪴", x: 0.31, y: 0.46, size: 38 },
        { emoji: "🌱", x: 0.46, y: 0.31, size: 34 },
        { emoji: "🌿", x: 0.62, y: 0.48, size: 42 },
        { emoji: "🪴", x: 0.78, y: 0.24, size: 36 }
      ]
    }
  ];

  const layout = layouts[Math.floor(Math.random() * layouts.length)];
  document.getElementById('ai-result-title').textContent = "✨ " + layout.title;
  document.getElementById('ai-result-text').innerHTML =
    layout.description +
    '<ul class="tips">' + layout.tips.map(t => `<li>${t}</li>`).join('') + '</ul>';

  drawPlantLayout(layout);
  document.getElementById('ai-result').classList.add('active');
}

function drawPlantLayout(layout){
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  const preview = document.getElementById('ai-preview');
  const displayedImg = preview.querySelector('img');

  canvas.width = 900;
  canvas.height = 700;

  const img = new Image();
  img.onload = function(){
    const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
    const drawW = img.width * scale;
    const drawH = img.height * scale;
    const dx = (canvas.width - drawW) / 2;
    const dy = (canvas.height - drawH) / 2;

    ctx.drawImage(img, dx, dy, drawW, drawH);

    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, 'rgba(45,138,61,0.05)');
    gradient.addColorStop(1, 'rgba(45,138,61,0.20)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 상단 타이틀 바
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(0, 0, canvas.width, 58);
    ctx.fillStyle = '#2D8A3D';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(layout.title, 20, 29);

    // 식물 배치: 원형 배경 + SVG 스타일 느낌의 이모지 배치
    layout.plants.forEach((p, i) => {
      const x = canvas.width * p.x;
      const y = canvas.height * p.y;
      const r = p.size * 0.62;

      // 그림자
      ctx.beginPath();
      ctx.fillStyle = 'rgba(0,0,0,0.14)';
      ctx.ellipse(x + 4, y + 8, r + 4, r * 0.82 + 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // 흰색 카드
      const bg = ctx.createRadialGradient(x - r*0.3, y - r*0.3, 2, x, y, r + 10);
      bg.addColorStop(0, 'rgba(255,255,255,0.96)');
      bg.addColorStop(1, 'rgba(255,255,255,0.82)');
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.arc(x, y, r + 8, 0, Math.PI * 2);
      ctx.fill();

      // 테두리
      ctx.strokeStyle = 'rgba(45,138,61,0.22)';
      ctx.lineWidth = 3;
      ctx.stroke();

      // 이모지
      ctx.font = `${p.size}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, x, y - 1);

      // 번호 뱃지
      ctx.fillStyle = '#2D8A3D';
      ctx.beginPath();
      ctx.arc(x + r*0.72, y - r*0.72, 11, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Arial';
      ctx.fillText(String(i+1), x + r*0.72, y - r*0.72 + 0.5);
    });

    // 하단 정보 영역
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.fillRect(0, canvas.height - 150, canvas.width, 150);
    ctx.fillStyle = '#222';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('배치 팁', 20, canvas.height - 120);

    ctx.font = '16px Arial';
    layout.tips.forEach((t, idx) => {
      ctx.fillText(`• ${t}`, 20, canvas.height - 90 + idx * 30);
    });

    const resultImage = document.getElementById('resultImage');
    resultImage.src = canvas.toDataURL('image/png');
    resultImage.style.display = 'block';
    document.getElementById('download-btn').style.display = 'block';
  };

  img.src = uploadedImageData;
}

function downloadImage(){
  const canvas = document.getElementById('resultCanvas');
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = 'garden-layout-' + Date.now() + '.png';
  link.click();
}
</script>
</body>
</html>
